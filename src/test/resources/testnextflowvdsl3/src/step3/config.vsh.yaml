name: step3
arguments:
  - name: "--input"
    type: file
    required: true
    multiple: true
    example: input.txt
  - name: "--output"
    type: file
    required: true
    direction: output
    example: output.txt
resources:
  - type: bash_script
    use_jq: true
    path: script.sh
engines:
  - type: native
  - type: docker
    image: nextflow/bash:latest
    setup:
      - type: apk
        packages:
          - jq
runners:
  - type: nextflow
