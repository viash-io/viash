name: integer_as_double
arguments:
  - name: "--input"
    type: file
    required: true
    example: input.txt
  - name: "--output"
    type: file
    required: true
    direction: output
    example: output.txt
  - name: "--double"
    type: double
    required: true
    direction: input
    example: 10.5
resources:
  - type: bash_script
    use_jq: true
    path: script.sh
engines:
  - type: native
  - type: docker
    image: nextflow/bash:latest
    setup:
      - type: apk
        packages:
          - jq
runners:
  - type: executable
  - type: nextflow
